<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Zen Meditation</title>
    <style>
        /* Initial peaceful state */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f4f4f9; /* Calming off-white */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
            transition: background 0.1s;
        }

        /* The broken glass background class (added via JS) */
        .shattered-bg {
            background-color: #000;
            background-image: url('images/broken-glass-bg.jpg');
            background-repeat: repeat; /* Tiles the image if it's too small */
        }

        /* The bait button */
        #bait-btn {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #8da399; /* Calming sage green */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
            z-index: 20; /* Keeps button clickable above everything */
        }

        #bait-btn:hover {
            background-color: #7a8f85;
        }

        /* Stone Cold Image (hidden initially) */
        #stone-cold {
            display: none; /* Hidden until clicked */
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            z-index: 10;
            position: absolute; /* Keeps it centered over the broken glass background */
        }
    </style>
</head>
<body>

    <button id="bait-btn">Begin Daily Meditation</button>

    <img id="stone-cold" src="" alt="WHAT?">

    <script>
        // --- CONFIGURATION ---
        const totalImages = 18; // Your total number of images
        const cooldownLimit = 6; // Number of images to remember before repeating

        // --- ELEMENTS ---
        const btn = document.getElementById('bait-btn');
        const img = document.getElementById('stone-cold');
        const body = document.body;
        
        // Pre-load the audio so it plays instantly
        const shatterSound = new Audio('images/glass-shatter.mp3');

        // --- MEMORY BANK (Local Storage) ---
        // Check the browser's memory for past images, or start an empty list if it's their first visit
        let recentImages = JSON.parse(localStorage.getItem('stoneColdHistory')) || [];

        // --- THE TRAP ---
        btn.addEventListener('click', () => {
            // 1. Play the sound
            shatterSound.play();

            // 2. Hide the button
            btn.style.display = 'none';

            // 3. Change background to tiled broken glass
            body.classList.add('shattered-bg');

            // 4. Pick a random number that is NOT in the recent history
            let randomNum;
            do {
                randomNum = Math.floor(Math.random() * totalImages) + 1;
            } while (recentImages.includes(randomNum));

            // 5. Add this new number to the history list
            recentImages.push(randomNum);

            // 6. If the history list is longer than our cooldown (6), remove the oldest memory
            if (recentImages.length > cooldownLimit) {
                recentImages.shift(); 
            }

            // 7. Save this updated history back into the browser's memory
            localStorage.setItem('stoneColdHistory', JSON.stringify(recentImages));

            // 8. Show the chosen image
            img.src = `images/what-${randomNum}.jpg`;
            img.style.display = 'block';
        });
    </script>
</body>
</html>
