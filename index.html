<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Zen Meditation</title>
    <style>
        /* Initial peaceful state */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f4f4f9; /* Calming off-white */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
            transition: background 0.1s;
        }

        /* The broken glass background class (added via JS) */
        .shattered-bg {
            background-color: #000;
            background-image: url('images/broken-glass-bg.jpg');
            background-repeat: repeat; /* Tiles the image if it's too small */
        }

        /* The bait button */
        #bait-btn {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #8da399; /* Calming sage green */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }

        #bait-btn:hover {
            background-color: #7a8f85;
        }

        /* Stone Cold Image (hidden initially) */
        #stone-cold {
            display: none; /* Hidden until clicked */
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            z-index: 10;
        }
    </style>
</head>
<body>

    <button id="bait-btn">Begin Daily Meditation</button>

    <img id="stone-cold" src="" alt="WHAT?">

    <script>
        // --- CONFIGURATION ---
        const totalImages = 10; // Update this to match your total number of "what" images

        // --- ELEMENTS ---
        const btn = document.getElementById('bait-btn');
        const img = document.getElementById('stone-cold');
        const body = document.body;
        
        // Pre-load the audio so it plays instantly on click
        const shatterSound = new Audio('images/glass-shatter.mp3');

        // --- THE TRAP ---
        btn.addEventListener('click', () => {
            // 1. Play the sound
            shatterSound.play();

            // 2. Hide the button
            btn.style.display = 'none';

            // 3. Change background to tiled broken glass
            body.classList.add('shattered-bg');

            // 4. Generate random number and show Stone Cold
            const randomNum = Math.floor(Math.random() * totalImages) + 1;
            img.src = `images/what-${randomNum}.jpg`;
            img.style.display = 'block';
        });
    </script>
</body>
</html>
